<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const CHARS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&';

const FONT_SIZE = 18;
let cols, drops, running = true;

function init() {
  canvas.width  = window.innerWidth  || screen.width;
  canvas.height = window.innerHeight || screen.height;
  cols  = Math.floor(canvas.width / FONT_SIZE);
  drops = Array(cols).fill(0).map(() => Math.floor(Math.random() * -50));
}

function draw() {
  if (!running) return;

  ctx.fillStyle = 'rgba(0,0,0,0.04)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = FONT_SIZE + 'px monospace';

  for (let i = 0; i < cols; i++) {
    const char = CHARS[Math.floor(Math.random() * CHARS.length)];
    const x = i * FONT_SIZE;
    const y = drops[i] * FONT_SIZE;

    // Tête : blanc-vert lumineux
    ctx.fillStyle  = '#ccffcc';
    ctx.shadowBlur  = 6;
    ctx.shadowColor = '#00ff41';
    ctx.fillText(char, x, y);

    // Corps immédiat : vert vif
    if (drops[i] > 1) {
      ctx.fillStyle  = '#00ff41';
      ctx.shadowBlur  = 0;
      ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], x, y - FONT_SIZE);
    }

    // Réinitialiser la colonne aléatoirement
    if (y > canvas.height && Math.random() > 0.97) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

// Pause/reprise depuis Android
function pauseMatrix()  { running = false; }
function resumeMatrix() { running = true; loop(); }

let lastTime = 0;
const INTERVAL = 80; // ms entre frames (~12fps) — économie batterie

function loop(ts = 0) {
  if (!running) return;
  if (ts - lastTime >= INTERVAL) {
    draw();
    lastTime = ts;
  }
  requestAnimationFrame(loop);
}

init();
window.addEventListener('resize', init);
loop();
</script>
</body>
</html>
